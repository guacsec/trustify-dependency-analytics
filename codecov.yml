coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: auto
        threshold: 1%
        informational: true

ignore:
  - "src/test/**"
  - "target/**"

flags:
  integration-tests:
    carryforward: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
